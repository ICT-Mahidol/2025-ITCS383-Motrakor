name: Smoke Test

on:
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: steamjek_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: Implementations/steamjek-backend
        run: npm install

      - name: Initialize Database
        env:
          PGPASSWORD: password
        run: |
          psql -h localhost -U user -d steamjek_test -f Implementations/steamjek-backend/db/setup.sql

      - name: Seed Database
        working-directory: Implementations/steamjek-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: steamjek_test
          DB_USER: user
          DB_PASSWORD: password
          JWT_SECRET: test_secret
        run: node seed.js

      - name: Start Server
        working-directory: Implementations/steamjek-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: steamjek_test
          DB_USER: user
          DB_PASSWORD: password
          JWT_SECRET: test_secret
          PORT: 3000
        run: |
          node server.js &
          npx wait-on http://localhost:3000/ -t 30000

      - name: Run Smoke Test
        working-directory: Implementations/steamjek-backend
        env:
          TEST_BASE_URL: http://localhost:3000
        run: node tests/smoke-test.js
